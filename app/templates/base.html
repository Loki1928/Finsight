<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Finsight{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
  <nav class="bg-white border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-5">
      <a href="/" class="font-semibold text-lg tracking-tight">Finsight</a>
      <div class="flex gap-4 text-sm">
        <a href="/" class="{% if request.url.path == '/' %}text-slate-900 font-medium{% else %}text-slate-600 hover:text-slate-900{% endif %}">Dashboard</a>
        <a href="/transactions" class="{% if '/transactions' in request.url.path %}text-slate-900 font-medium{% else %}text-slate-600 hover:text-slate-900{% endif %}">Transactions</a>
        <a href="/categories" class="{% if '/categories' in request.url.path %}text-slate-900 font-medium{% else %}text-slate-600 hover:text-slate-900{% endif %}">Categories</a>
        <a href="/rules" class="{% if '/rules' in request.url.path %}text-slate-900 font-medium{% else %}text-slate-600 hover:text-slate-900{% endif %}">Rules</a>
        <a href="/upload" class="{% if '/upload' in request.url.path %}text-slate-900 font-medium{% else %}text-slate-600 hover:text-slate-900{% endif %}">Upload</a>
        <a href="/feedback" class="{% if '/feedback' in request.url.path %}text-slate-900 font-medium{% else %}text-slate-600 hover:text-slate-900{% endif %}">Feedback</a>
      </div>
      {% if user %}
      <div class="ml-auto flex items-center gap-3">
        {% if user.picture_url %}
        <img src="{{ user.picture_url }}" alt=""
             class="w-7 h-7 rounded-full object-cover ring-1 ring-slate-200" />
        {% endif %}
        <span class="text-sm text-slate-700 hidden md:inline">{{ user.full_name or user.email }}</span>
        <a href="/account" class="text-sm text-slate-500 hover:text-slate-900">Account</a>
        <a href="/auth/logout" class="text-sm text-slate-500 hover:text-red-600">Log out</a>
      </div>
      {% endif %}
    </div>
  </nav>
  <main class="max-w-5xl mx-auto px-4 py-8 flex-1 w-full">
    {% block content %}{% endblock %}
  </main>
  <footer class="border-t border-slate-200 bg-white mt-auto">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between text-xs text-slate-400">
      <span>Finsight — your finances, your data</span>
      <div class="flex gap-4">
        <a href="/privacy" class="hover:text-slate-600">Privacy</a>
        <a href="/terms" class="hover:text-slate-600">Terms</a>
      </div>
    </div>
  </footer>
</body>
</html>
