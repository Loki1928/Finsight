<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Finsight{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <nav class="bg-white border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-6">
      <a href="/" class="font-semibold text-lg">Finsight</a>
      <a href="/" class="text-sm text-slate-600 hover:text-slate-900">Dashboard</a>
      <a href="/transactions" class="text-sm text-slate-600 hover:text-slate-900">Transactions</a>
      <a href="/transactions/add" class="text-sm text-slate-600 hover:text-slate-900">Add transaction</a>
      <a href="/upload" class="text-sm text-slate-600 hover:text-slate-900">Upload</a>
      <a href="/feedback">Feedback</a>

      {% if user %}
      <div class="ml-auto flex items-center gap-3">
        {% if user.picture_url %}
        <img src="{{ user.picture_url }}" alt="avatar"
             class="w-7 h-7 rounded-full object-cover ring-1 ring-slate-200" />
        {% endif %}
        <span class="text-sm text-slate-700">{{ user.full_name or user.email }}</span>
        <a href="/auth/logout" class="text-sm text-slate-500 hover:text-red-600">Log out</a>
      </div>
      {% endif %}
    </div>
  </nav>
  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
